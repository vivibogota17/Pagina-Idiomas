<!doctype html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ingresra </title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/login.css" />
</head>

<body>
  <!-- A menú de arriba -->
  <header>
    <nav class="menu">
      <a class="logo" href="index.html">
        <img src="img/logo-blanco.png" alt="AMY Lingual" />
      </a>
      <!-- Chicas, este es el truco más fácil: un checkbox invisible que hace de botón de hamburguesa sin necesidad de JavaScript -->
      <input type="checkbox" id="check-menu" class="check-menu">
      <label for="check-menu" class="checkbtn">☰</label>
      <ul class="nav-links">
        <li><a href="index.html">Inicio</a></li>
        <li><a href="planes.html">Planes</a></li>
        <li><a href="nosotros.html">Nosotras</a></li>

      </ul>
      <div class="nav-user">
        <a href="formulario.html" class="nav-cta">Inscribirme ahora</a>
        <a href="login.html" class="nav-login"><img src="img/user.svg" alt="login"><span
            id="usuarioActivo">Ingresar</span></a>
      </div>
    </nav>
  </header>

  <!--contenido fuerte de la página -->
  <main>
    <!--  inicien sesión -->
    <section id="login-container">
      <div id="login-box">
        <div id="login-header">
          <img src="img/logo-colorido.png" alt="AMY Lingual" class="login-logo" />
          <h1>Inicia Sesión</h1>
          <p>Bienvenido a AMY Lingual</p>
        </div>

        <form action="post" id="form-login">
          <div id="form-group">
            <label for="usuario">Usuario</label>
            <input type="text" id="usuario" name="usuario" placeholder="Ingresa tu usuario" required />
          </div>

          <div id="form-group">
            <label for="contraseña">Contraseña</label>
            <input type="password" id="contrasena" name="contrasena" placeholder="Ingresa tu contraseña" required />
          </div>

          <button type="submit" class="boton-login">Inicia Sesión</button>
        </form>
        <p id="mensaje"></p>

        <script src="js/login.js"></script>

        <!--  <div class="login-footer">
          <p>¿No tienes cuenta? <a href="#">Regístrate aquí</a></p>
          <p><a href="#">¿Olvidaste tu contraseña?</a></p>
        </div>
      </div> -->
    </section>
  </main>

  <!-- footer -->
  <footer>
    <p>
      &copy; 2026 AMY Lingual. Derechos reservados a Yury, Andrea y Martha.
    </p>
  </footer>
  </body>

</html>
