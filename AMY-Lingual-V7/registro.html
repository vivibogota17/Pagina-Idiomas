<!doctype html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Registro - AMY Lingual</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/login.css" />
</head>

<body>
  <!--  menú -->
  <header>
    <nav class="menu">
      <a class="logo" href="index.html">
        <img src="img/logo-blanco.png" alt="AMY Lingual" />
      </a>
      <!-- botón de hamburguesa -->
      <input type="checkbox" id="check-menu" class="check-menu">
      <label for="check-menu" class="checkbtn">☰</label>
      <ul class="nav-links">
        <li><a href="index.html">Inicio</a></li>
        <li><a href="planes.html">Planes</a></li>
        <li><a href="nosotros.html">Nosotras</a></li>

      </ul>
      <div class="nav-user">
        <a href="incribirme.html" class="nav-cta">Inscribirme ahora</a>
        <a href="login.html" class="nav-login"><img src="img/user.svg" alt="login"><span
            id="usuarioActivo">Ingresar</span></a>
      </div>
    </nav>
  </header>

  <main>

    <section id="login-container">
      <div id="login-box">
        <div id="login-header">
          <img src="img/logo-colorido.png" alt="AMY Lingual" class="login-logo" />
          <h1>Regístrate</h1>
          <p>Crea tu cuenta en AMY Lingual</p>
        </div>

        <form action="post" id="form-registro">
          <div id="form-group">
            <label for="nombre">Nombre Completo</label>
            <input type="text" id="nombre" name="nombre" placeholder="Ingresa tu nombre completo" required />
          </div>

          <div id="form-group">
            <label for="correo">Correo Electrónico</label>
            <input type="email" id="correo" name="correo" placeholder="tu@correo.com" required />
          </div>

          <div id="form-group">
            <label for="contrasena">Contraseña</label>
            <input type="password" id="contrasena" name="contrasena" placeholder="Crea una contraseña segura"
              required />
          </div>

          <button type="submit" class="boton-login">Crear Cuenta</button>
        </form>
        <p id="mensaje"></p>

        <div class="login-footer">
          <p>¿Ya tienes cuenta? <a href="login.html">Inicia Sesión</a></p>
        </div>
      </div>
    </section>
  </main>

  <!-- pie de página -->
  <footer>
    <p>
      &copy; 2026 AMY Lingual. Derechos reservados a Yury, Andrea y Martha.
    </p>
  </footer>
</body>

</html>
